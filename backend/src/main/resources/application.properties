server.port=8080

# Superset connection
superset.base-url=${SUPERSET_BASE_URL:http://localhost:8088}
superset.username=${SUPERSET_USERNAME:admin}
superset.password=${SUPERSET_PASSWORD:admin}
superset.provider=${SUPERSET_PROVIDER:db}

# Guest user identity reflected in Superset logs/audit
superset.guest-user-username=${SUPERSET_GUEST_USERNAME:embed_user}
superset.guest-user-first-name=${SUPERSET_GUEST_FIRST_NAME:Embed}
superset.guest-user-last-name=${SUPERSET_GUEST_LAST_NAME:User}

# Frontend origin for CORS
app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
